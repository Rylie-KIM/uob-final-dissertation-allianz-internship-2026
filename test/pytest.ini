[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: slow end-to-end pipeline tests (run with -m integration)
    slow: any test expected to take > 10 seconds

# Default: skip integration tests unless explicitly requested
addopts = -v --tb=short -m "not integration"

# Suppress matplotlib, sklearn, scipy warnings during test runs
filterwarnings =
    ignore::UserWarning
    ignore::FutureWarning
    ignore::RuntimeWarning
    ignore::DeprecationWarning
